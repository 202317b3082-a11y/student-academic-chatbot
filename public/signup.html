<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | Ray - BITS Pilani</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --background: #081123;
      --panel: #0f172a;
      --surface: #111f3c;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --border: rgba(148, 163, 184, 0.15);
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.25);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 35%),
        linear-gradient(180deg, var(--background) 0%, #050814 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .container:hover {
      box-shadow: 0 32px 90px rgba(56, 189, 248, 0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo img {
      height: 50px;
      width: auto;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.2));
      transition: transform 150ms ease;
    }

    .logo img:hover {
      transform: scale(1.05);
    }

    .logo h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .logo p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 150ms ease;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.2);
      transition: all 150ms ease;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(56, 189, 248, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    .toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .toggle a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: color 150ms ease;
    }

    .toggle a:hover {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    body.light-theme {
      --background: #f8fafc;
      --panel: #ffffff;
      --surface: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --border: rgba(148, 163, 184, 0.35);
      --shadow: 0 20px 55px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Ray Logo">
      <h1>Ray</h1>
      <p>Create Ray Assistant Account</p>
    </div>

    <form id="signupForm" onsubmit="event.preventDefault();">
      <div class="form-group">
        <label for="signupName">Full Name</label>
        <input type="text" id="signupName" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="signupEmail">Email Address</label>
        <input type="email" id="signupEmail" placeholder="name@email.com" required>
        <small id="emailError" style="color: #ff6b6b; font-size: 12px; display: none; margin-top: 4px;"></small>
      </div>

      <div class="form-group">
        <label for="signupMobile">Mobile Number</label>
<input type="tel" id="signupMobile"
       placeholder="1234567890"
       inputmode="numeric"
       maxlength="15"
       pattern="[0-9]{10,15}"
       required>
        <small id="mobileError" style="color: #ff6b6b; font-size: 12px; display: none; margin-top: 4px;"></small>
        <small id="mobileHint" style="color: #94a3b8; font-size: 11px; margin-top: 6px; display: block;">
          10-15 digits required
        </small>
      </div>

      <div class="form-group">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••" required>
        <small id="passwordError" style="color: #ff6b6b; font-size: 12px; display: none; margin-top: 4px;"></small>
        <small id="passwordHint" style="color: #94a3b8; font-size: 11px; margin-top: 6px; display: block; line-height: 1.4;">
          Password must be at least 8 characters with: uppercase, lowercase, number, and special character (!@#$%^&*)
        </small>
      </div>

      <button id="signupButton">Sign Up</button>
    </form>

    <div class="toggle">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>

  <script>
    const validateEmail = (email) => {
      const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return pattern.test(email);
    };

    const validatePassword = (password) => {
      const checks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
      };
      return checks;
    };

    const getPasswordErrorMessage = (password) => {
      const checks = validatePassword(password);
      if (!checks.length) return "Password must be at least 8 characters long.";
      if (!checks.uppercase) return "Password must contain at least one uppercase letter.";
      if (!checks.lowercase) return "Password must contain at least one lowercase letter.";
      if (!checks.number) return "Password must contain at least one number.";
      if (!checks.special) return "Password must contain at least one special character (!@#$%^&*).";
      return "";
    };

    const validateMobile = (mobile) => {
      if (!mobile) return true;
      const mobileClean = mobile.replace(/[\s-]/g, '');
      if (!/^\d+$/.test(mobileClean)) return false;
      if (mobileClean.length < 10) return false;
      if (mobileClean.length > 15) return false;
      return true;
    };

    const getMobileErrorMessage = (mobile) => {
      if (!mobile) return "";
      const mobileClean = mobile.replace(/[\s-]/g, '');
      if (!/^\d+$/.test(mobileClean)) return "Mobile number must contain only digits.";
      if (mobileClean.length < 10) return "Mobile number must be at least 10 digits long.";
      if (mobileClean.length > 15) return "Mobile number must not exceed 15 digits.";
      return "";
    };

    const emailInput = document.getElementById('signupEmail');
    const passwordInput = document.getElementById('signupPassword');
    const mobileInput = document.getElementById('signupMobile');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const mobileError = document.getElementById('mobileError');

    emailInput.addEventListener('blur', () => {
      const email = emailInput.value.trim();
      if (email && !validateEmail(email)) {
        emailError.textContent = 'Invalid email format.';
        emailError.style.display = 'block';
      } else {
        emailError.style.display = 'none';
      }
    });

    mobileInput.addEventListener('blur', () => {
      const mobile = mobileInput.value.trim();
      if (mobile && !validateMobile(mobile)) {
        const errorMsg = getMobileErrorMessage(mobile);
        mobileError.textContent = errorMsg;
        mobileError.style.display = 'block';
      } else {
        mobileError.style.display = 'none';
      }
    });

    passwordInput.addEventListener('blur', () => {
      const password = passwordInput.value;
      if (password) {
        const errorMsg = getPasswordErrorMessage(password);
        if (errorMsg) {
          passwordError.textContent = errorMsg;
          passwordError.style.display = 'block';
        } else {
          passwordError.style.display = 'none';
        }
      }
    });

    document.getElementById('signupButton').addEventListener('click', async (e) => {
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const mobile = document.getElementById("signupMobile").value.trim();
      const password = document.getElementById("signupPassword").value;

      // Validation
      if (!name || !email || !mobile || !password) {
        alert('All fields are required.');
        return;
      }

      if (!validateEmail(email)) {
        alert('Please enter a valid email address.');
        return;
      }

      if (!validateMobile(mobile)) {
        const errorMsg = getMobileErrorMessage(mobile);
        alert(errorMsg);
        return;
      }

      const passwordError = getPasswordErrorMessage(password);
      if (passwordError) {
        alert(passwordError);
        return;
      }

      try {
        const response = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: 'include',
          body: JSON.stringify({ name, email, mobile, password })
        });

        const data = await response.json();
        if (response.ok) {
          alert('User created successfully. Please login.');
          window.location.href = '/public/login.html';
        } else {
          alert(data.message || 'Signup failed');
        }
      } catch (error) {
        alert("Signup failed");
      }
    });
  </script>

</body>
</html>
