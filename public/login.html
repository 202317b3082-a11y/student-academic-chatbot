<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Ray - BITS Pilani</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --background: #081123;
      --panel: #0f172a;
      --surface: #111f3c;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --border: rgba(148, 163, 184, 0.15);
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.25);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 35%),
        linear-gradient(180deg, var(--background) 0%, #050814 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(12px);
    }

    .container:hover {
      box-shadow: 0 32px 90px rgba(56, 189, 248, 0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo img {
      height: 50px;
      width: auto;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.2));
      transition: transform 150ms ease;
    }

    .logo img:hover {
      transform: scale(1.05);
    }

    .logo h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .logo p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 150ms ease;
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.2);
      transition: all 150ms ease;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(56, 189, 248, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    .toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    .toggle a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: color 150ms ease;
    }

    .toggle a:hover {
      color: var(--accent-strong);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Ray Logo">
      <h1>Ray</h1>
      <p>Ray Assistant Portal</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit">Log In</button>
    </form>

    <div class="toggle">
      New user? <a href="/public/signup.html">Create an account</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        credentials: 'include',
        body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value})
      });
      const data = await res.json();
      if (res.ok) {
        // Redirect based on user role
        const redirectUrl = data.redirect_url || '/chat';
        window.location.href = redirectUrl;
      } else {
        alert(data.message || 'Login failed');
      }
    });
  </script>

</body>
</html>
